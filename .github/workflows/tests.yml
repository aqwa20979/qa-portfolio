name: Run Tests

on:
  push:
    branches: [ main ]
    paths-ignore:
      - 'README.md'

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.14'

    - name: Install dependencies
      run: |
        pip install pytest requests allure-pytest
        pip install playwright
        playwright install chromium

    - name: Run API tests
      run: |
        pytest api_tests/test_api_posts.py api_tests/test_schema.py -v

    - name: Run Playwright UI tests
      run: |
        pytest api_tests/test_ui_playwright.py -v